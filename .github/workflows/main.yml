name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Verify JAR File
      run: |
        echo "Listing jar files"
        ls target/

    - name: Upload JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.TOMCAT_HOST }} 
        username: ${{ secrets.TOMCAT_USER }} 
        key: ${{ secrets.SSH_PRIVATE_KEY }} 
        source: "target/*.jar"
        target: "/tmp/"

    - name: Deploy Application
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.TOMCAT_HOST }} 
        username: ${{ secrets.TOMCAT_USER }} 
        key: ${{ secrets.SSH_PRIVATE_KEY }} 
        script: |
          echo "Stopping old app"
          nohup java -jar /tmp/*.jar > app.log 2>&1 &        
          echo "Deployment successful"

  publish-job:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - run: mvn --batch-mode --update-snapshots verify -DskipTests

    - run: mkdir staging && cp target/*.jar staging

    - uses: actions/upload-artifact@v4
      with:
        name: Package
        path: staging
  Gitleaks-scan:
      runs-on: ubuntu-latest
      needs: publish-job
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2
      - name: Run Gitleaks Scan
        run: gitleaks detect --source . --report-path gitleaks-report.json
  
  Trivy-scan:
      runs-on: ubuntu-latest
      needs: Gitleaks-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        
  SonarQube-scan:
      runs-on: ubuntu-latest
      needs: Trivy-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4  
      - name: SonarQube Scan
        run: |
          mvn clean verify sonar:sonar \
          -DskipTests \
          -Dsonar.projectKey=votezy \
          -Dsonar.host.url=http://54.176.130.119:9000 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - name: Pull OWASP ZAP Docker image
        run: docker pull ictu/zap2docker-weekly

      - name: Start OWASP ZAP scan
        run: |
          sudo chmod -R 777 $(pwd)  # Ensure the directory has the correct permissions
          docker run --network zap-network -v $(pwd):/zap/wrk/:rw -t ictu/zap2docker-weekly zap-baseline.py -t http://dast-automation-web:8080 -r zap_report.html || true

  
  buils_docker_image_and_push:
    runs-on: self-hosted
    needs: SonarQube-scan
    steps:
    - uses: actions/checkout@v4
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app  # this will download JAR to ./app folder
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: adijaiswal/bankapp:latest
        file: ./Dockerfile

  deploy_to_kubernetes:
    runs-on: self-hosted
    needs: buils_docker_image_and_push
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Install AWS CLI
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: latest
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.EKS_KUBECONFIG }}" > $HOME/.kube/config
    - name: Deploy to EKS
      run: |
        kubectl apply -f ds.yml
