name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Verify JAR File
      run: |
        echo "Listing jar files"
        ls target/

    - name: Upload JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.TOMCAT_HOST }} 
        username: ${{ secrets.TOMCAT_USER }} 
        key: ${{ secrets.SSH_PRIVATE_KEY }} 
        source: "target/*.jar"
        target: "/tmp/"

    - name: Deploy Application
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.TOMCAT_HOST }} 
        username: ${{ secrets.TOMCAT_USER }} 
        key: ${{ secrets.SSH_PRIVATE_KEY }} 
        script: |
          echo "Stopping old app"
          nohup java -jar /tmp/*.jar > app.log 2>&1 &        
          echo "Deployment successful"

  publish-job:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - run: mvn --batch-mode --update-snapshots verify -DskipTests

    - run: mkdir staging && cp target/*.jar staging

    - uses: actions/upload-artifact@v4
      with:
        name: Package
        path: staging
  Gitleaks-scan:
      runs-on: ubuntu-latest
      needs: publish-job
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2
      - name: Run Gitleaks Scan
        run: gitleaks detect --source . --report-path gitleaks-report.json
  
  Trivy-scan:
      runs-on: ubuntu-latest
      needs: Gitleaks-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        
  SonarQube-scan:
      runs-on: ubuntu-latest
      needs: Trivy-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4  
      - name: SonarQube Scan
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.host.url=http://54.176.130.119:9000 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}         
            env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} 


      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - name: Pull OWASP ZAP Docker image
        run: docker pull ictu/zap2docker-weekly

      - name: Start OWASP ZAP scan
        run: |
          sudo chmod -R 777 $(pwd)  # Ensure the directory has the correct permissions
          docker run --network zap-network -v $(pwd):/zap/wrk/:rw -t ictu/zap2docker-weekly zap-baseline.py -t http://dast-automation-web:8080 -r zap_report.html || true

